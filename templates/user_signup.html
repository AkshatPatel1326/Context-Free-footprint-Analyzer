<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Footprint Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-logo">📝</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Register to start your profile analysis</p>

            {% if error %}
            <div class="alert alert-error">⚠ {{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('user_signup') }}">

                <div class="form-group">
                    <label class="form-label" for="username">Full Name</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Your Full Name"
                        value="{{ username if username else '' }}" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com"
                        value="{{ email if email else '' }}" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Minimum 6 characters" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                        placeholder="Re-enter your password" autocomplete="new-password" required>
                </div>

                <div style="margin-top: 24px;">
                    <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
                </div>

            </form>

            <div class="divider"></div>

            <div class="auth-footer-text">
                Already have an account?
                <a href="{{ url_for('user_login') }}">Sign in</a>
            </div>

            <div class="auth-footer-text" style="margin-top: 10px;">
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </div>

        </div>
    </div>

</body>

</html>
