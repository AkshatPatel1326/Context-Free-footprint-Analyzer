<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Footprint Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">🛡️</div>
        <h1 class="auth-title">Admin Access</h1>
        <p class="auth-subtitle">Restricted area — administrators only</p>

        {% if error %}
        <div class="alert alert-error">
            ⚠ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('admin') }}">

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter admin username" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter admin password" autocomplete="current-password" required>
            </div>

            <div style="margin-top: 24px;">
                <button type="submit" class="btn btn-primary btn-full">
                    Login to Dashboard
                </button>
            </div>

        </form>

        <div class="auth-footer-text" style="margin-top: 24px;">
            <a href="{{ url_for('home') }}">← Back to Home</a>
        </div>

    </div>
</div>

</body>
</html>
